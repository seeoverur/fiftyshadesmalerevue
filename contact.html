<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Fifty Shades</title>
  <meta name="description" content="Submit your booking request for private event entertainment." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0f0f14;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .hero {
      background: linear-gradient(rgba(8,8,12,0.75), rgba(8,8,12,0.9));
      padding: 100px 0 60px;
      text-align: center;
    }

    .card-dark {
      background-color: #1a1a24;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
    }

    .btn-main {
      background: linear-gradient(90deg, #ff5fa2, #ff8d5f);
      color: #fff;
      border: none;
      padding: 0.85rem;
      font-weight: 700;
    }

    .btn-main:hover {
      color: #fff;
      opacity: 0.95;
    }

    .form-control,
    .form-select {
      background-color: #111119;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .form-control:focus,
    .form-select:focus {
      background-color: #111119;
      color: #fff;
      border-color: #ff5fa2;
      box-shadow: 0 0 0 0.25rem rgba(255,95,162,0.15);
    }

    footer {
      background-color: #0b0b10;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .small-muted {
      color: rgba(255,255,255,0.68);
    }
  </style>
</head>
<body>
<!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Fifty Shades</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="privacy-policy.html">Privacy</a></li>
        </ul>
      </div>
    </div>
  </nav>
<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 class="display-5 fw-bold mb-3">Submit Your Request</h1>
    <p class="small-muted mb-0">
      Fill out the form below and we’ll follow up with availability and details.
    </p>
  </div>
</section>

<!-- FORM ONLY -->
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card card-dark p-4 p-md-5">

          <form>

            <div class="row g-3">

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="First Name">
              </div>

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Last Name">
              </div>

              <div class="col-md-6">
                <input type="email" class="form-control" placeholder="Email">
              </div>

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Phone (Optional)">
              </div>

              <div class="col-md-6">
                <select class="form-select">
                  <option selected>Event Type</option>
                  <option>Bachelorette Party</option>
                  <option>Birthday Party</option>
                  <option>Ladies Night</option>
                  <option>Private Event</option>
                </select>
              </div>

              <div class="col-md-6">
                <input type="date" class="form-control">
              </div>

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="City / Location">
              </div>

              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Group Size">
              </div>

              <div class="col-12">
                <textarea class="form-control" rows="5" placeholder="Event details..."></textarea>
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-main w-100">
                  Send Request
                </button>
              </div>

            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="py-4 text-center">
  <div class="container">
    <p class="small-muted mb-0">Fifty Shades • Private Event Booking</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
